# ClusterRole with CRD + core permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ambassador-{{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - services
      - secrets
      - endpoints
    verbs: ["get", "list", "watch"]

  - apiGroups: ["getambassador.io"]
    resources:
      - mappings
      - hosts
      - modules
      - ratelimitservices
      - tlscontexts
      - tracingservices
      - logservices
      - kubernetesserviceresolvers
      - kubernetesendpointresolvers
      - ambassadorinstallations
    verbs: ["get", "list", "watch"]

  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - ingressclasses
    verbs: ["get", "list", "watch"]

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ambassador
  namespace: {{ .Release.Namespace }}

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "ambassador-binding-{{ .Release.Namespace }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ambassador-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: ambassador
    namespace: {{ .Release.Namespace }}
